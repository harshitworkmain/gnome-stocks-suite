id: io.github.harshitworkmain.GnomeStocks
runtime: org.gnome.Platform
runtime-version: "44"
sdk: org.gnome.Sdk
command: gnome-stocks-widget

finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri

modules:
  - name: gnome-stocks-widget
    buildsystem: simple
    build-commands:
      - install -Dm755 gnome-stocks-widget/widget.py /app/bin/gnome-stocks-widget
      - mkdir -p /app/share/gnome-stocks-widget/web
      - cp -r gnome-stocks-widget/web/* /app/share/gnome-stocks-widget/web/
      - install -Dm644 gnome-stocks-widget/gnome-stocks-widget.desktop /app/share/applications/io.github.harshitworkmain.GnomeStocks.desktop
      # Patch widget.py paths for Flatpak sandbox
      - sed -i 's|SCRIPT_DIR = .*|SCRIPT_DIR = "/app/share/gnome-stocks-widget"|' /app/bin/gnome-stocks-widget
    sources:
      - type: git
        url: https://github.com/harshitworkmain/gnome-stocks-suite.git
        branch: main
